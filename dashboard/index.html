<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Samsung GenAI · Mission Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <p class="eyebrow"><span class="led"></span>Samsung GenAI Program</p>
        <h1>Mission Console</h1>
      </div>
      <div class="updated" id="updated">—</div>
    </header>

    <nav class="tabs" id="tabs"></nav>

    <div class="hero" id="hero">
      <div class="hero-stats">
        <div class="hero-stat"><div class="num" id="stat-submitted">–</div><div class="label">Submitted</div></div>
        <div class="hero-stat"><div class="num" id="stat-total">–</div><div class="label">Cohort size</div></div>
        <div class="hero-stat"><div class="num" id="stat-day">–</div><div class="label">Day</div></div>
      </div>
    </div>

    <div id="content">
      <div class="empty">Loading leaderboard…</div>
    </div>

    <footer>
      Auto-refreshes every 20s · reads <code>submissions/dayN.json</code> straight from each student's fork
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
